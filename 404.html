<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #05070f, #090d1a);
        color: #eef2ff;
      }
      .box {
        width: min(90vw, 520px);
        padding: 32px;
        border-radius: 22px;
        border: 1px solid rgba(91, 124, 255, 0.24);
        background: rgba(12, 16, 31, 0.9);
        text-align: center;
      }
      a {
        color: #90a8ff;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>404</h1>
      <p>The page you requested could not be found.</p>
      <p><a href="/">Go back home</a></p>
    </div>
  </body>
</html>
